<div class="flex flex-col items-center justify-center gap-3 px-4 py-8 text-center">
  <i
    [class]="icon() + ' text-2xl text-p-text-muted'"
    aria-hidden="true"
  ></i>

  <div class="space-y-1">
    <p class="text-sm font-semibold text-p-text-primary">{{ title() }}</p>
    <p class="text-xs text-p-text-muted">{{ message() }}</p>
  </div>

  @if (actionLabel() && actionRouterLink()) {
    <p-button
      size="small"
      [label]="actionLabel()!"
      [routerLink]="actionRouterLink()!"
    />
  }
</div>
